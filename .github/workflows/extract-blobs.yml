name: Extract Vendor Blobs

on:
  workflow_dispatch:
    inputs:
      firmware_dump_repo:
        description: 'Firmware dump repository (e.g. user/device_firmware_dump)'
        required: true
      firmware_dump_branch:
        description: 'Firmware dump branch (e.g. main)'
        required: true
        default: 'main'
      target_branch:
        description: 'Branch to push vendor blobs to'
        required: true
        default: 'main'

env:
  DEVICE: gta9p
  VENDOR: samsung
  VENDOR_DEVICE: vendor_samsung_gta9p

jobs:
  extract:
    name: Extract blobs
    runs-on: ubuntu-22.04
    if: github.event.repository.owner.id == github.event.sender.id
    permissions:
      contents: write
    steps:
      - name: Checkout device tree
        uses: actions/checkout@v4
        with:
          path: device/${{ env.VENDOR }}/${{ env.DEVICE }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            adb \
            binwalk \
            e2fsprogs \
            erofs-utils \
            img2simg \
            libncurses5 \
            simg2img \
            libzstd-dev \
            zstd

      - name: Clone firmware dump
        run: |
          git clone --depth=1 \
            "https://github.com/${{ github.event.inputs.firmware_dump_repo }}.git" \
            -b "${{ github.event.inputs.firmware_dump_branch }}" \
            firmware-dump

      - name: Clone LineageOS extract-utils
        run: |
          git clone --depth=1 \
            https://github.com/LineageOS/android_tools_extract-utils.git \
            -b lineage-21.0 \
            tools/extract-utils
          git clone --depth=1 \
            https://github.com/LineageOS/android_prebuilts_extract-tools.git \
            -b lineage-21.0 \
            prebuilts/extract-tools

      - name: Setup extract-utils workspace
        run: |
          cd device/${{ env.VENDOR }}/${{ env.DEVICE }}
          # Create the setup workspace that extract-files.sh expects
          mkdir -p../../../../../vendor/${{ env.VENDOR }}/${{ env.DEVICE }}
          mkdir -p../../../../../tools/extract-utils
          mkdir -p../../../../../prebuilts/extract-tools
          cp -r ${{ github.workspace }}/tools/extract-utils/* ../../../../../tools/extract-utils/
          cp -r ${{ github.workspace }}/prebuilts/extract-tools/* ../../../../../prebuilts/extract-tools/

      - name: Prepare extraction
        run: |
          cd device/${{ env.VENDOR }}/${{ env.DEVICE }}
          chmod +x extract-files.sh setup-makefiles.sh

          # Check if firmware dump has raw partition images
          if [ -f "${{ github.workspace }}/firmware-dump/vendor.img" ]; then
            echo "Found raw partition images in firmware dump"
            echo "DUMP_DIR=${{ github.workspace }}/firmware-dump" >> $GITHUB_ENV
          elif [ -f "${{ github.workspace }}/firmware-dump/super.img" ]; then
            echo "Found super.img, extracting partitions..."
            mkdir -p ${{ github.workspace }}/firmware-dump/extracted

            # Convert sparse to raw if needed
            if file "${{ github.workspace }}/firmware-dump/super.img" | grep -q "Android sparse image"; then
              img2simg "${{ github.workspace }}/firmware-dump/super.img" \
                "${{ github.workspace }}/firmware-dump/super.raw.img"
              SIMG="${{ github.workspace }}/firmware-dump/super.raw.img"
            else
              SIMG="${{ github.workspace }}/firmware-dump/super.img"
            fi

            # Try to extract using lpunpack or simg2img
            if command -v lpunpack &> /dev/null; then
              lpunpack "$SIMG" "${{ github.workspace }}/firmware-dump/extracted/"
            fi

            echo "DUMP_DIR=${{ github.workspace }}/firmware-dump/extracted" >> $GITHUB_ENV
          elif [ -d "${{ github.workspace }}/firmware-dump/vendor" ]; then
            echo "Found extracted vendor directory"
            echo "DUMP_DIR=${{ github.workspace }}/firmware-dump" >> $GITHUB_ENV
          else
            echo "ERROR: No recognized firmware dump format found"
            echo "Expected: vendor.img, super.img, or vendor/ directory"
            ls -la ${{ github.workspace }}/firmware-dump/
            exit 1
          fi

      - name: Extract blobs via ADB (if device available)
        if: ${{ success() }}
        run: |
          cd device/${{ env.VENDOR }}/${{ env.DEVICE }}
          # This will attempt ADB extraction if a device is connected
          # Falls back to firmware dump if no device
          timeout 30 adb devices || true
          if adb get-state 2>/dev/null | grep -q "device"; then
            echo "Device connected, extracting via ADB..."
            ./extract-files.sh --no-repo-sync
          else
            echo "No device connected, skipping ADB extraction"
          fi

      - name: Extract blobs from dump
        if: ${{ always() }}
        run: |
          cd device/${{ env.VENDOR }}/${{ env.DEVICE }}
          # Run extraction from firmware dump
          if [ -d "$DUMP_DIR" ]; then
            echo "Extracting from firmware dump: $DUMP_DIR"
            # Use a simplified extraction that copies from dump
            while IFS= read -r line; do
              # Skip comments and empty lines
              [[ "$line" =~ ^#.*$ ]] && continue
              [[ -z "$line" ]] && continue

              src="$line"
              dest="${{ github.workspace }}/vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/proprietary/$line"

              # Try to find the file in the dump
              if [ -f "$DUMP_DIR/$src" ]; then
                mkdir -p "$(dirname "$dest")"
                cp "$DUMP_DIR/$src" "$dest"
                echo "  OK: $src"
              else
                echo "  MISSING: $src"
              fi
            done < proprietary-files.txt
          fi

      - name: Generate vendor makefiles
        run: |
          cd device/${{ env.VENDOR }}/${{ env.DEVICE }}
          chmod +x setup-makefiles.sh
          ./setup-makefiles.sh

      - name: Push vendor tree
        run: |
          VENDOR_REPO="https://github.com/${{ github.repository_owner }}/${{ env.VENDOR_DEVICE }}.git"

          cd vendor/${{ env.VENDOR }}/${{ env.DEVICE }}
          git init
          git branch -M ${{ github.event.inputs.target_branch }}
          git add .
          git commit -s -m "${{ env.DEVICE }}: proprietary: initial vendor tree

          Extracted from firmware dump: ${{ github.event.inputs.firmware_dump_repo }}"
          git remote add origin "$VENDOR_REPO"
          git push origin HEAD:${{ github.event.inputs.target_branch }} --force || {
            echo "Creating vendor repository..."
            gh repo create "${{ env.VENDOR_DEVICE }}" \
              --public \
              --description "Vendor tree for ${{ env.DEVICE }}" \
              --source=. \
              --remote=origin \
              --push
          }
