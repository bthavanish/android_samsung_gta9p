name: Extract Vendor Blobs

on:
  workflow_dispatch:
    inputs:
      firmware_dump_repo:
        description: 'Firmware dump repo (user/repo) or leave empty for ADB extraction'
        required: false
      firmware_dump_branch:
        description: 'Firmware dump branch'
        required: false
        default: 'main'
      commit_message:
        description: 'Commit message for extracted blobs'
        required: false
        default: 'gta9p: proprietary: update vendor blobs from firmware'

env:
  DEVICE: gta9p
  VENDOR: samsung
  DEVICE_COMMON: sm6375-common

jobs:
  extract:
    name: Extract blobs
    runs-on: ubuntu-22.04
    if: github.event.repository.owner.id == github.event.sender.id
    permissions:
      contents: write
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
        with:
          path: self

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            adb \
            binwalk \
            e2fsprogs \
            erofs-utils \
            img2simg \
            libncurses5 \
            simg2img \
            libzstd-dev \
            zstd \
            patchelf

      - name: Clone LineageOS extract-utils
        run: |
          git clone --depth=1 \
            https://github.com/LineageOS/android_tools_extract-utils.git \
            -b lineage-21.0 \
            self/tools/extract-utils
          git clone --depth=1 \
            https://github.com/LineageOS/android_prebuilts_extract-tools.git \
            -b lineage-21.0 \
            self/prebuilts/extract-tools

      - name: Clone firmware dump (if provided)
        if: ${{ github.event.inputs.firmware_dump_repo != '' }}
        run: |
          git clone --depth=1 \
            "https://github.com/${{ github.event.inputs.firmware_dump_repo }}.git" \
            -b "${{ github.event.inputs.firmware_dump_branch }}" \
            firmware-dump

      - name: Prepare firmware dump
        if: ${{ github.event.inputs.firmware_dump_repo != '' }}
        run: |
          cd firmware-dump

          # Check if firmware dump has raw partition images
          if [ -f "vendor.img" ]; then
            echo "Found raw vendor partition image"
            echo "DUMP_DIR=$(pwd)" >> $GITHUB_ENV
          elif [ -f "super.img" ]; then
            echo "Found super.img, extracting partitions..."
            mkdir -p extracted

            # Convert sparse to raw if needed
            if file "super.img" | grep -q "Android sparse image"; then
              img2simg super.img super.raw.img
              SIMG="super.raw.img"
            else
              SIMG="super.img"
            fi

            # Try to extract using lpunpack
            if command -v lpunpack &> /dev/null; then
              lpunpack "$SIMG" extracted/
            fi

            echo "DUMP_DIR=$(pwd)/extracted" >> $GITHUB_ENV
          elif [ -d "vendor" ]; then
            echo "Found extracted vendor directory"
            echo "DUMP_DIR=$(pwd)" >> $GITHUB_ENV
          else
            echo "ERROR: No recognized firmware dump format found"
            ls -la
            exit 1
          fi

      - name: Extract blobs from firmware dump (common)
        if: ${{ github.event.inputs.firmware_dump_repo != '' }}
        run: |
          cd self
          if [ -d "$DUMP_DIR" ]; then
            echo "Extracting common blobs from: $DUMP_DIR"
            while IFS= read -r line; do
              # Skip comments and empty lines
              [[ "$line" =~ ^#.*$ ]] && continue
              [[ -z "$line" ]] && continue

              src="$line"
              dest="vendor/${{ env.VENDOR }}/${{ env.DEVICE_COMMON }}/proprietary/$line"

              # Try to find the file in the dump
              if [ -f "$DUMP_DIR/$src" ]; then
                mkdir -p "$(dirname "$dest")"
                cp "$DUMP_DIR/$src" "$dest"
                echo "  OK: $src"
              else
                echo "  MISSING: $src"
              fi
            done < device/samsung/${{ env.DEVICE_COMMON }}/proprietary-files.txt
          fi

      - name: Extract blobs from firmware dump (device)
        if: ${{ github.event.inputs.firmware_dump_repo != '' }}
        run: |
          cd self
          if [ -d "$DUMP_DIR" ]; then
            echo "Extracting device blobs from: $DUMP_DIR"
            while IFS= read -r line; do
              # Skip comments and empty lines
              [[ "$line" =~ ^#.*$ ]] && continue
              [[ -z "$line" ]] && continue

              src="$line"
              dest="vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/proprietary/$line"

              # Try to find the file in the dump
              if [ -f "$DUMP_DIR/$src" ]; then
                mkdir -p "$(dirname "$dest")"
                cp "$DUMP_DIR/$src" "$dest"
                echo "  OK: $src"
              else
                echo "  MISSING: $src"
              fi
            done < device/samsung/${{ env.DEVICE }}/proprietary-files.txt
          fi

      - name: Extract blobs via ADB (if device available)
        if: ${{ github.event.inputs.firmware_dump_repo == '' }}
        run: |
          cd self
          echo "Attempting ADB extraction..."
          timeout 30 adb devices || true
          if adb get-state 2>/dev/null | grep -q "device"; then
            echo "Device connected, extracting via ADB..."
            export DEVICE=${{ env.DEVICE_COMMON }}
            export VENDOR=${{ env.VENDOR }}
            ./device/samsung/${{ env.DEVICE_COMMON }}/extract-files.sh adb
          else
            echo "No device connected and no firmware dump provided"
            echo "Please provide a firmware dump repo or connect a device"
            exit 1
          fi

      - name: Verify extraction
        run: |
          cd self
          echo "=== Common vendor blobs ==="
          find vendor/${{ env.VENDOR }}/${{ env.DEVICE_COMMON }}/proprietary -type f 2>/dev/null | wc -l
          echo "=== Device vendor blobs ==="
          find vendor/${{ env.VENDOR }}/${{ env.DEVICE }}/proprietary -type f 2>/dev/null | wc -l

      - name: Commit and push
        run: |
          cd self
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -s -m "${{ github.event.inputs.commit_message || 'gta9p: proprietary: update vendor blobs' }}"
            git push
          fi
